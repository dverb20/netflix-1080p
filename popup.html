<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Channel Surfer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #141414;
      color: #e5e5e5;
      font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      background: #000;
      padding: 16px 18px 14px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 26px; line-height: 1; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .header-text p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* ── Section ── */
    .section {
      padding: 14px 18px;
      border-bottom: 1px solid #222;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 10px;
    }

    /* ── Surf Now button ── */
    #open-netflix {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      background: #e50914;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
    }

    #open-netflix:hover  { background: #f40612; }
    #open-netflix:active { transform: scale(0.97); }

    /* ── Content type pills ── */
    .pill-group {
      display: flex;
      gap: 6px;
    }

    .pill {
      flex: 1;
      padding: 6px 0;
      background: #222;
      border: 1.5px solid transparent;
      border-radius: 4px;
      color: #aaa;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .pill:hover { background: #2e2e2e; color: #ddd; }

    .pill.active {
      border-color: #e50914;
      color: #fff;
      background: #1e0000;
    }

    /* ── Range slider ── */
    .range-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .range-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .range-header span { color: #aaa; font-size: 12px; }
    .range-value       { color: #fff !important; font-weight: 600; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #444;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #e50914;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.25);
      transition: box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px rgba(229, 9, 20, 0.35);
    }

    /* dual slider track fill */
    .dual-range { position: relative; height: 4px; }
    .dual-range-track {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #e50914;
      border-radius: 2px;
    }

    /* ── Status / saved message ── */
    #save-status {
      min-height: 16px;
      font-size: 11px;
      color: #4caf50;
      text-align: right;
      padding: 6px 18px 4px;
      transition: opacity 0.3s;
    }

    #save-status.hidden { opacity: 0; }

    /* ── Footer ── */
    .footer {
      padding: 10px 18px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }

    .footer a { color: #666; text-decoration: none; }
    .footer a:hover { color: #aaa; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📺</div>
    <div class="header-text">
      <h1>Channel Surfer</h1>
      <p>Netflix, but like cable TV</p>
    </div>
  </div>

  <!-- Surf Now -->
  <div class="section">
    <button id="open-netflix">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Open Netflix &amp; Surf
    </button>
  </div>

  <!-- Content Type -->
  <div class="section">
    <div class="section-label">Content preference</div>
    <div class="pill-group">
      <button class="pill" data-type="shows">TV Shows</button>
      <button class="pill active" data-type="both">Both</button>
      <button class="pill" data-type="movies">Movies</button>
    </div>
  </div>

  <!-- Drop-in Point -->
  <div class="section">
    <div class="section-label">Drop-in range</div>
    <div class="range-row">
      <div class="range-header">
        <span>Earliest start</span>
        <span class="range-value" id="min-label">15%</span>
      </div>
      <input type="range" id="seek-min" min="0" max="60" value="15" step="5" />
    </div>
    <br/>
    <div class="range-row">
      <div class="range-header">
        <span>Latest start</span>
        <span class="range-value" id="max-label">80%</span>
      </div>
      <input type="range" id="seek-max" min="40" max="95" value="80" step="5" />
    </div>
  </div>

  <!-- Save status -->
  <div id="save-status" class="hidden">Settings saved ✓</div>

  <div class="footer">
    Click the <strong style="color:#888">Surf</strong> button on any Netflix page
    to jump into random content, already in progress.
  </div>

  <script src="popup.js"></script>
</body>
</html>
